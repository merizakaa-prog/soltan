<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet & Salt | T1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --main: #d4a373; --accent: #27ae60; --bg-dark: #1a0f05; --card-bg: rgba(255, 255, 255, 0.05); }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; direction: rtl;
            background: var(--bg-dark); color: #fff; min-height: 100vh; overflow-x: hidden;
        }

        /* --- شاشة التحميل --- */
        #loadingOverlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20000; transition: opacity 0.5s ease-out;
        }
        .loader-circle {
            width: 40px; height: 40px; border: 3px solid rgba(212, 163, 115, 0.2);
            border-top: 4px solid var(--main); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- الهيدر والبار --- */
        .header { position: fixed; top: 0; width: 100%; background: #000; padding: 15px; border-bottom: 2px solid var(--main); z-index: 1000; text-align: center; height: 60px; box-sizing: border-box; }
        .category-bar { position: fixed; top: 60px; width: 100%; display: flex; gap: 12px; padding: 15px; background: rgba(26, 15, 5, 0.98); overflow-x: auto; z-index: 900; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .category-bar::-webkit-scrollbar { display: none; }
        
        .cat-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-width: 75px; height: 75px; background: var(--card-bg); border-radius: 15px; 
            border: 1px solid rgba(212, 163, 115, 0.1); transition: 0.3s; flex-shrink: 0; cursor: pointer; 
        }
        .cat-item i { font-size: 18px; margin-bottom: 4px; color: var(--main); }
        .cat-item span { font-size: 11px; font-weight: bold; }
        .cat-item.active { background: var(--main); border-color: #fff; transform: translateY(-3px); }
        .cat-item.active i, .cat-item.active span { color: #1a0f05; }

        /* --- حاوية الأطباق --- */
        .container { padding: 15px; margin-top: 165px; padding-bottom: 100px; }
        
        .item-card { 
            display: flex; align-items: center; margin-bottom: 25px; height: 115px; 
            position: relative;
        }
        .item-card:nth-child(even) { flex-direction: row-reverse; }

        /* الدائرة الخاصة بالصورة */
        .img-wrapper { 
            width: 100px; height: 100px; flex-shrink: 0; z-index: 10; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
        }
        .img-wrapper img { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 3px solid #fff; box-sizing: border-box;
        }
        
        /* المستطيل الاحترافي بدلاً من البيضاوي */
        .info-panel { 
            flex-grow: 1; background: #fff; height: 95px; 
            margin-right: -40px; /* تداخل مع الدائرة */
            padding: 10px 50px 10px 15px; 
            border-radius: 12px; /* زوايا مستطيلة احترافية */
            display: flex; flex-direction: column; justify-content: center; color: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .item-card:nth-child(even) .info-panel { 
            margin-right: 0; margin-left: -40px; padding: 10px 15px 10px 50px; 
            border-radius: 12px; text-align: left; 
        }
        
        .info-panel h4 { margin: 0; font-size: 1.05rem; color: #1a0f05; font-weight: 700; }
        .price { color: var(--accent); font-weight: 800; font-size: 0.95rem; margin-top: 4px; }

        /* أزرار الأيقونات */
        .icon-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-start; }
        .item-card:nth-child(even) .icon-actions { justify-content: flex-end; }
        
        .icon-btn { 
            width: 34px; height: 34px; border-radius: 8px; border: none; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 14px; cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .btn-vid { background: #FF0000; color: #fff; } 
        .btn-ing { background: #f1c40f; color: #000; } 
        .btn-buy { background: var(--accent); color: #fff; } 
        .icon-btn:active { transform: scale(0.9); }

        /* --- السلة والمودال --- */
        .float-btn { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; 
            background: var(--accent); color: white; padding: 16px; border-radius: 15px; 
            display: none; justify-content: space-between; z-index: 2000; font-weight: bold; box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
        }
        .modal { position: fixed; background: #fff; color: #000; border-radius: 20px 20px 0 0; z-index: 4000; display: none; flex-direction: column; bottom: 0; left: 0; width: 100%; height: 70%; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .black-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); z-index: 3000; display: none; }
        .full-screen { display: none; position: fixed; inset: 0; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; background: #1a0f05; padding: 20px; }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="loader-circle"></div></div>
<div id="globalOverlay" class="black-overlay" onclick="closeModals()"></div>

<div id="welcomeScreen" class="full-screen" style="display: flex;">
    <div style="background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--main); text-align: center; width: 80%;">
        <h1 style="color: var(--main); font-size: 35px; margin: 0;">Berberous</h1>
        <p style="color: #ccc; margin-bottom: 30px;">الطاولة رقم 1</p>
        <button style="background:var(--main); border:none; padding:15px; border-radius:12px; font-weight:bold; color:#1a0f05; width: 100%;" onclick="startSession()">🛒 دخول المنيو</button>
    </div>
</div>

<div id="mainContent" style="display:none;">
    <div class="header"><h3>Sweet & Salt Menu</h3></div>
    
    <div class="category-bar">
        <div class="cat-item active" onclick="changeCat('Pizza', this)"><i class="fas fa-pizza-slice"></i><span>Pizza</span></div>
        <div class="cat-item" onclick="changeCat('Snacks', this)"><i class="fas fa-hamburger"></i><span>Snacks</span></div>
        <div class="cat-item" onclick="changeCat('Plats', this)"><i class="fas fa-utensils"></i><span>Plats</span></div>
        <div class="cat-item" onclick="changeCat('Boisson', this)"><i class="fas fa-glass-whiskey"></i><span>Boisson</span></div>
    </div>

    <div class="container" id="grid"></div>

    <button id="floatBtn" class="float-btn" onclick="toggleCart(true)">
        <span>سلة الطلبات (<span id="cartCount">0</span>)</span>
        <span id="totalDisplay">0 دج</span>
    </button>
</div>

<div id="cartModal" class="modal">
    <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">طلباتك 🛒</h3>
        <i class="fas fa-times" onclick="toggleCart(false)" style="font-size:20px; padding: 5px;"></i>
    </div>
    <div id="cartItemsList" style="flex-grow:1; overflow-y:auto; padding:20px;"></div>
    <div style="padding:20px; background: #f9f9f9; border-radius: 20px 20px 0 0;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; margin-bottom:15px;">
            <span>الإجمالي:</span>
            <span id="cartModalTotal" style="color:var(--accent);">0 دج</span>
        </div>
        <button onclick="sendOrder()" style="width:100%; background:var(--accent); color:white; border:none; padding:18px; border-radius:12px; font-weight:bold;">إرسال الطلب ✅</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSy...", projectId: "andr-eccef" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];

window.onload = () => {
    setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 800);
};

function startSession() {
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    fetchDishes('Pizza');
}

function fetchDishes(cat) {
    db.collection("dishes").where("category", "==", cat).onSnapshot(snap => {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            grid.innerHTML += `
                <div class="item-card">
                    <div class="img-wrapper"><img src="${d.img || 'https://via.placeholder.com/100'}"></div>
                    <div class="info-panel">
                        <h4>${d.name}</h4>
                        <div class="price">${d.price} دج</div>
                        <div class="icon-actions">
                            <button class="icon-btn btn-buy" onclick="addToCart('${d.name}', ${d.price})"><i class="fas fa-plus"></i></button>
                            <button class="icon-btn btn-ing" onclick="alert('المكونات: ${d.ingredients || 'طازجة وطبيعية'}')"><i class="fas fa-leaf"></i></button>
                            ${d.video ? `<a href="${d.video}" target="_blank" class="icon-btn btn-vid"><i class="fas fa-play"></i></a>` : ''}
                        </div>
                    </div>
                </div>`;
        });
    });
}

function changeCat(cat, el) {
    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    fetchDishes(cat);
}

function addToCart(name, price) {
    cart.push({ id: Date.now(), name, price });
    updateCartUI();
}

function updateCartUI() {
    const total = cart.reduce((a, b) => a + b.price, 0);
    document.getElementById('cartCount').innerText = cart.length;
    document.getElementById('totalDisplay').innerText = total + " دج";
    document.getElementById('cartModalTotal').innerText = total + " دج";
    document.getElementById('floatBtn').style.display = cart.length > 0 ? 'flex' : 'none';
    
    document.getElementById('cartItemsList').innerHTML = cart.map(i => `
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px;">
            <span>${i.name}</span>
            <div style="display:flex; align-items:center;">
                <span style="font-weight:bold; margin-left:12px;">${i.price} دج</span>
                <i class="fas fa-trash-alt" style="color:#e74c3c" onclick="removeFromCart(${i.id})"></i>
            </div>
        </div>`).join('');
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
    if(cart.length === 0) toggleCart(false);
}

function toggleCart(show) {
    document.getElementById('cartModal').style.display = show ? 'flex' : 'none';
    document.getElementById('globalOverlay').style.display = show ? 'block' : 'none';
}

function closeModals() { toggleCart(false); }

function sendOrder() {
    if(cart.length === 0) return;
    db.collection("menu").add({
        tableNumber: 1, items: cart, total: cart.reduce((a,b)=>a+b.price, 0),
        status: "جديد", time: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        alert("تم إرسال طلبك! استمتع بوقتك ✨");
        cart = []; updateCartUI(); toggleCart(false);
    });
}
</script>
</body>
</html>
