<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو 3D على جيتهاب</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; background-color: #0F172A; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        model-viewer { width: 90vw; height: 80vh; }
    </style>
</head>
<body>

    <model-viewer 
        src="cake.glb" 
        ios-src="cake.usdz"
        alt="طبق ثلاثي الأبعاد" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
