<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض طبق AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}
model-viewer{
    width:100%;
    height:100vh;
}
</style>
</head>
<body>

<model-viewer
    src="plate.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="طبق ثلاثي الأبعاد">
    
    <button slot="ar-button"
        style="padding:12px 20px;font-size:18px;">
        عرض الطبق في الواقع المعزز AR
    </button>

</model-viewer>

</body>
</html>
